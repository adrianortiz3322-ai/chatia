<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OcladeAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #0a0a1a;
      color: #e0e0ff;
      height: 100vh;
      overflow: hidden;
      position: relative;
      -webkit-text-size-adjust: 100%;
    }

    /* Partículas — canvas nativo */
    #particles-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Contenedor principal */
    .app {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* Título fijo arriba */
    .header {
      text-align: center;
      padding: 16px 0;
      background: rgba(10, 10, 20, 0.7);
      border-bottom: 1px solid rgba(80, 80, 120, 0.3);
      z-index: 20;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00f2d3, #6a11cb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pulseLogo 2s infinite alternate;
    }
    @keyframes pulseLogo {
      0% { transform: scale(1); }
      100% { transform: scale(1.02); }
    }

    /* Área de mensajes — fija entre header e input */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
    }

    /* Saludo inicial */
    .initial-message {
      text-align: center;
      max-width: 85%;
      margin: 0 auto;
    }
    .initial-message h2 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00f2d3, #6a11cb, #a1c4fd);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 6s ease infinite;
      margin-bottom: 8px;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .initial-message p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 12px;
    }
    .initial-message .date {
      font-size: 0.9rem;
      color: #aaa;
    }

    /* Mensaje del bot */
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(40, 40, 50, 0.6);
      color: #e0e0ff;
      line-height: 1.5;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Contenedor con avatar */
    .msg-with-avatar {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    /* Modelo 3D pequeño (anillo) */
    .ring-avatar {
      width: 36px;
      height: 36px;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(6deg); }
    }
    .ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 2px solid transparent;
      border-radius: 50%;
    }
    .ring.outer {
      border-image: conic-gradient(#00f2d3, #6a11cb, #a1c4fd, #00f2d) 1;
    }
    .ring.inner {
      width: 60%;
      height: 60%;
      top: 20%;
      left: 20%;
      border-image: conic-gradient(#6a11cb, #a1c4fd, #00f2d3, #6a11cb) 1;
      animation: spin 4s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #00f2d3;
      border-radius: 50%;
      top: -3px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 8px #00f2d3;
    }
    .dot:nth-child(2) { transform: translateX(-50%) rotate(72); top: -3px; }
    .dot:nth-child(3) { transform: translateX(-50%) rotate(144deg); top: -3px; }
    .dot:nth-child(4) { transform: translateX(-50%) rotate(216deg); top: -3px; }
    .dot:nth-child(5) { transform: translateX(-50%) rotate(288deg); top: -3px; }

    /* Mensaje del usuario */
    .user-message {
      background: linear-gradient(90deg, #2575fc, #6a11cb);
      color: white;
      align-self: flex-end;
    }

    /* Botón desplegable — fijo arriba del input */
    .model-selector {
      padding: 0 20px 10px;
    }
    .model-btn {
      width: 100%;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      color: #e0e0ff;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.3s;
    }
    .model-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .modelafter {
      content: "▼";
      font-size: 0.7rem;
    }
    .model-btn.open::after {
      content: "▲";
    }

    .model-menu {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(15, 15, 25, 0.95);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin-top: 8px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      z-index: 100;
    }
    .model-menu.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .model-item {
      padding: 10px 20px;
      color: #e0e0ff;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }
    .model-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    /* Input — fijo abajo, con padding para teclado */
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: rgba(10, 10, 20, 0.9);
      border-top: 1px solid rgba(80, 80, 120, 0.3);
      z-index: 20;
    }
    .input-area input {
      width: 100%;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .input-area button {
      margin-left: 10px;
      padding: 14px 22px;
      background: linear-gradient(90deg, #00f2d3, #6a11cb);
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .input-area button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 12px rgba(0, 242, 211, 0.5);
    }

    /* Para iOS: evitar que el input suba el chat */
    @supports (-webkit-touch-callout: none) {
      .messages-area {
        padding-bottom: 20px; /* espacio para el input fijo */
      }
      .input-area {
        padding-bottom: env(safe-area-inset-bottom, 20px);
      }
    }
  </style>
</head>
<body>

  <!-- Partículas nativas -->
  <canvas id="particles-canvas"></canvas>

  <div class="app">
    <!-- Título fijo arriba -->
    <div class="header">
      <div class="logo">OcladeAI</div>
    </div>

    <!-- Área de mensajes -->
    <div class="messages-area" id="messages-area">
      <div class="initial-message">
        <h2 id="greeting-text">Buenas tardes</h2>
        <p>¿En qué te puedo ayudar hoy?</p>
        <div class="date" id="date-info">Cargando...</div>
      </div>
    </div>

    <!-- Botón desplegable -->
    <div class="model-selector">
      <div class="model-btn" id="model-btn">⚡ Seleccionar modelo</div>
      <div class="model-menu" id="model-menu">
        <div class="model-item" data-model="code">💻 Code</div>
        <div class="model-item" data-model="think">🧠 Think</div>
        <div class="model-item" data-model="chat">💬 Chat</div>
        <div class="model-item" data-model="vision">👁️ Vision</div>
        <div class="model-item" data-model="audio">🎧 Audio</div>
      </div>
    </div>

    <!-- Input fijo abajo -->
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Escribe tu mensaje..." />
      <button id="send-btn">Enviar</button>
    </div>
  </div>

  <script>
    // === PARTÍCULAS PROFESIONALES (NATIVAS, SIN LIBRERÍAS) ===
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    const particles = [];
    const particleCount = 80;
    const colors = ['#00f2d3', '#6a11cb', '#a1c4fd', '#e0e0ff'];

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 3 + 1;
        this.speedX = (Math.random() - 0.5) * 0.6;
        this.speedY = (Math.random() - 0.5) * 0.6;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.alpha = Math.random() * 0.5 + 0.3;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > width) this.speedX *= -1;
        if (this.y < 0 || this.y > height) this.speedY *= -1;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${parseInt(this.color.slice(1, 3), 16)}, ${parseInt(this.color.slice(3, 5), 16)}, ${parseInt(this.color.slice(5, 7), 16)}, ${this.alpha})`;
        ctx.fill();
      }

      drawLines(particles) {
        particles.forEach(other => {
          const dx = this.x - other.x;
          const dy = this.y - other.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            const opacity = 1 - dist / 100;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${parseInt(this.color.slice(1, 3), 16)}, ${parseInt(this.color.slice(3, 5), 16)}, ${parseInt(this.color.slice(5, 7), 16)}, ${opacity * 0.3})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(other.x, other.y);
            ctx.stroke();
          }
        });
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      particles.forEach(p => {
        p.update();
        p.drawLines(particles);
      });
      requestAnimationFrame(animate);
    }
    animate();

    // === SALUDO Y FECHA ===
    const now = new Date();
    const hour = now.getHours();
    const greetingEl = document.getElementById('greeting-text');
    const dateEl = document.getElementById('date-info');

    greetingEl.textContent = 
      hour >= 6 && hour < 12 ? "Buenos días" :
      hour >= 12 && hour < 19 ? "Buenas tardes" : "Buenas noches";

    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    dateEl.textContent = `Hoy es ${now.toLocaleDateString('es-ES', options)}`;

    // === TYPOWRITER ===
    const helpText = document.querySelector('.initial-message p');
    const fullText = "¿En qué te puedo ayudar hoy?";
    helpText.innerHTML = '';
    let i = 0;
    const typewriter = setInterval(() => {
      helpText.innerHTML += fullText.charAt(i);
      i++;
      if (i >= fullText.length) clearInterval(typewriter);
    }, 80);

    // === MENÚ DESPLEGABLE ===
    const modelBtn = document.getElementById('model-btn');
    const modelMenu = document.getElementById('model-menu');
    const modelItems = document.querySelectorAll('.model-item');

    modelBtn.addEventListener('click', () => {
      modelBtn.classList.toggle('open');
      modelMenu.classList.toggle('open');
    });

    modelItems.forEach(item => {
      item.addEventListener('click', () => {
        modelItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        modelBtn.innerHTML = `${item.innerHTML} <span style="opacity:0.7;font-size:0.7em;">✓</span>`;
        modelBtn.classList.remove('open');
        modelMenu.classList.remove('open');
      });
    });

    document.addEventListener('click', (e) => {
      if (!modelBtn.contains(e.target) && !modelMenu.contains(e.target)) {
        modelBtn.classList.remove('open');
        modelMenu.classList.remove('open');
      }
    });

    // === ENVIAR MENSAJE ===
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const messagesArea = document.getElementById('messages-area');

    function createAvatar() {
      return `
        <div class="ring-avatar">
          <div class="ring outer"></div>
          <div class="ring inner"></div>
        </div>
      `;
    }

    function addMessage(text, isUser) {
      const msgContainer = document.createElement('div');
      msgContainer.className = 'msg-with-avatar';

      const message = document.createElement('div');
      message.className = 'message';
      if (isUser) {
        message.classList.add('user-message');
      }
      message.textContent = text;

      if (isUser) {
        msgContainer.style.flexDirection = 'row-reverse';
        msgContainer.style.justifyContent = 'flex-end';
        msgContainer.appendChild(message);
      } else {
        const avatar = document.createElement('div');
        avatar.innerHTML = createAvatar();
        msgContainer.appendChild(avatar);
        msgContainer.appendChild(message);
      }

      messagesArea.appendChild(msgContainer);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    sendBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;

      // Eliminar saludo inicial
      const initial = document.querySelector('.initial-message');
      if (initial) initial.remove();

      // Mensaje usuario
      addMessage(text, true);
      input.value = '';

      // Respuesta bot
      setTimeout(() => {
        addMessage(`Gracias por tu mensaje: "${text}". ¿En qué más puedo ayudarte?`, false);
      }, 1500);
    });

    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendBtn.click();
    });
  </script>
</body>
</html>
