<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OcladeIA - Asistente Profesional</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background: #0d0d0d;
      color: #f0f0f0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 900px;
      height: 90vh;
      background: transparent;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: none; /* Quitamos blur para que se vea el fondo */
    }
    .header {
      padding: 20px;
      text-align: center;
      background: rgba(15, 15, 15, 0.7);
      border-radius: 20px 20px 0 0;
      border-bottom: 1px solid rgba(80, 80, 120, 0.2);
    }
    .header h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .header p {
      font-size: 0.9rem;
      color: #aaa;
    }
    .chat-area {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: rgba(10, 10, 10, 0.6); /* Semi-transparente */
      border-radius: 0 0 20px 20px;
    }
    .message {
      max-width: 85%;
      padding: 14px 20px;
      border-radius: 18px;
      line-height: 1.5;
      animation: fadeInUp 0.3s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user-message {
      align-self: flex-end;
      background: linear-gradient(90deg, #2575fc, #6a11cb);
      color: white;
    }
    .ai-message {
      align-self: flex-start;
      background: rgba(40, 40, 50, 0.8);
      color: #e0e0ff;
    }
    .input-section {
      display: flex;
      padding: 20px;
      background: rgba(10, 10, 10, 0.7);
      border-radius: 0 0 20px 20px;
      border-top: 1px solid rgba(80, 80, 120, 0.2);
    }
    .input-section input {
      flex: 1;
      padding: 16px 20px;
      border-radius: 50px;
      border: 1px solid rgba(100, 100, 150, 0.3);
      background: rgba(30, 30, 40, 0.8);
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .input-section input:focus {
      border-color: #2575fc;
    }
    .input-section button {
      margin-left: 12px;
      padding: 16px 28px;
      background: linear-gradient(90deg, #2575fc, #6a11cb);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }
    .input-section button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(106, 17, 203, 0.5);
    }
  </style>
</head>
<body>

  <!-- Partículas de fondo -->
  <div id="particles-js"></div>

  <div class="container">
    <div class="header">
      <h1>OcladeIA</h1>
      <p>Asistente Profesional con Inteligencia Artificial</p>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="message ai-message">
        ¡Hola! Soy <strong>OcladeIA</strong>. Estoy aquí para ayudarte con cualquier pregunta. ¿En qué puedo colaborarte?
      </div>
    </div>

    <div class="input-section">
      <input type="text" id="user-input" placeholder="Escribe tu pregunta a OcladeIA..." />
      <button id="send-btn">Enviar</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Configuración de partículas
    particlesJS("particles-js", {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: { value: 0.5, random: true },
        size: { value: 2, random: true },
        line_linked: {
          enable: true,
          distance: 120,
          color: "#6a11cb",
          opacity: 0.3,
          width: 1
        },
        move: {
          enable: true,
          speed: 1.5,
          direction: "none",
          random: true,
          straight: false,
          out_mode: "out",
          bounce: false
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" },
          resize: true
        }
      }
    });

    const chatArea = document.getElementById('chat-area');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Simular respuesta de IA con búsqueda web
    async function getAIResponse(query) {
      const responses = [
        `Sobre "${query}", he encontrado que ...`,
        `La información más reciente sobre "${query}" indica que ...`,
        `Tras revisar mis fuentes, puedo decirte que ${query} ...`,
        `Basándome en lo que sé, ${query} se refiere a ...`
      ];
      return responses[Math.floor(Math.random() * responses.length)];
    }

    // Enviar mensaje
    sendBtn.addEventListener('click', async () => {
      const userText = input.value.trim();
      if (!userText) return;

      // Mostrar mensaje del usuario
      addMessage(userText, 'user');

      // Limpiar entrada
      input.value = '';

      // Mostrar "escribiendo..."
      const typing = document.createElement('div');
      typing.className = 'message ai-message';
      typing.textContent = 'OcladeIA está escribiendo...';
      chatArea.appendChild(typing);
      chatArea.scrollTop = chatArea.scrollHeight;

      // Obtener respuesta de IA
      const aiResponse = await getAIResponse(userText);

      // Quitar "escribiendo..." y mostrar respuesta
      typing.remove();
      addMessage(aiResponse, 'ai');
    });

    // Función para agregar mensaje al chat
    function addMessage(text, sender) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}-message`;
      messageDiv.textContent = text;
      chatArea.appendChild(messageDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Permitir enviar con Enter
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });
  </script>

</body>
</html>
