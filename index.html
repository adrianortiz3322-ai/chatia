 position: relative;

    .dot:nth-child(5) { transform: translateX(-50%) rotate(288deg); top: -3px; }

    @keyframes spinRing {

    }
    @keyframes rotateRing {
      0% { transform: rotate(0deg); }

    }

     : none;

<body>

  <!-- Partículas -->
  <div id="particles-js"></div>

  <div class="app">
    <!-- Título centrado -->
    <div class="header">
      <div class="logo">OcladeAI</div>
    </div>

    <!-- Chat: contenido inicial -->
    <div class="chat-content" id="chat-content">
      <div class="greeting" id="greeting-text">Buenas tardes</div>
      <div class="typewriter-container">
        <div class="typewriter" id="help-text">¿En qué te puedo ayudar hoy?</div>
      </div>
      <div class="date-info" id="date-info">Cargando fecha...</div>
    </div>

    <!-- Botón desplegable (ahora se abre hacia arriba) -->
    <div class="model-selector">
      <div class="model-btn" id="model-btn">⚡ Seleccionar modelo</div>
      <div class="model-menu" id="model-menu">
        <div class="model-item" data-model="code">💻 Oclade Code</div>
        <div class="model-item" data-model="think">🧠 Oclade Think</div>
        <div class="model-item" data-model="chat">💬 Oclade Chat Pro</div>
      </div>
    </div>

    <!-- Input con adjuntar -->
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Escribe tu mensaje..." />
      <button class="attach-btn" id="attach-btn">📎</button>
      <button id="send-btn">Enviar</button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-icon">🤖</div>
      <span>oclade-ia.vercel.app</span>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Configuración de partículas
    particlesJS("particles-js", {
      particles: {
        number: { value: 70, density: { enable: true, value_area: 800 } },
        color: { value: ["#00f2d3", "#6a11cb", "#a1c4fd", "#e0e0ff"] },
        shape: { type: "circle" },
        opacity: { value: 0.5, random: true },
        size: { value: 2.5, random: true },
        line_linked: {
          enable: true,
          distance: 120,
          color: "#00f2d3",
          opacity: 0.2,
          width: 0.8
        },
        move: {
          enable: true,
          speed: 1.1,
          direction: "none",
          random: true,
          straight: false,
          out_mode: "out",
          bounce: false
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" },
          resize: true
        }
      }
    });

    // Saludo dinámico
    const now = new Date();
    const hour = now.getHours();
    let greeting = "";
    if (hour >= 6 && hour < 12) greeting = "Buenos días";
    else if (hour >= 12 && hour < 19) greeting = "Buenas tardes";
    else greeting = "Buenas noches";

    document.getElementById('greeting-text').textContent = greeting;

    // Fecha actual
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const dateStr = now.toLocaleDateString('es-ES', options);
    document.getElementById('date-info').textContent = `Hoy es ${dateStr}`;

    // Typewriter effect
    const helpText = document.getElementById('help-text');
    const fullText = "¿En qué te puedo ayudar hoy?";
    helpText.innerHTML = '';
    let i = 0;
    const typewriter = setInterval(() => {
      helpText.innerHTML += fullText.charAt(i);
      i++;
      if (i >= fullText.length) clearInterval(typewriter);
    }, 80);

    // Menú desplegable (abre hacia arriba)
    const modelBtn = document.getElementById('model-btn');
    const modelMenu = document.getElementById('model-menu');
    const modelItems = document.querySelectorAll('.model-item');

    modelBtn.addEventListener('click', () => {
      modelBtn.classList.toggle('open');
      modelMenu.classList.toggle('open');
    });

    modelItems.forEach(item => {
      item.addEventListener('click', () => {
        modelItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        modelBtn.innerHTML = `${item.innerHTML} <span style="opacity:0.7;font-size:0.7em;">✓</span>`;
        modelBtn.classList.remove('open');
        modelMenu.classList.remove('open');
      });
    });

    document.addEventListener('click', (e) => {
      if (!modelBtn.contains(e.target) && !modelMenu.contains(e.target)) {
        modelBtn.classList.remove('open');
        modelMenu.classList.remove('open');
      }
    });

    // Adjuntar archivo
    const attachBtn = document.getElementById('attach-btn');
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*,application/pdf,.doc,.docx,.txt';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    attachBtn.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        alert(`Archivo adjuntado: ${file.name}`);
      }
    });

    // Función para crear el modelo 3D
    function createAvatar() {
      return `
        <div class="ring-avatar">
          <div class="ring outer">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
          <div class="ring inner">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
        </div>
      `;
    }

    // Agregar mensaje
    function addMessage(text, isUser) {
      const chatContent = document.getElementById('chat-content');
      const msgContainer = document.createElement('div');
      msgContainer.className = 'msg-with-avatar';

      const message = document.createElement('div');
      message.className = 'message';
      if (isUser) {
        message.classList.add('user-message');
      }
      message.textContent = text;

      if (isUser) {
        msgContainer.style.flexDirection = 'row-reverse';
        msgContainer.style.justifyContent = 'flex-end';
        msgContainer.appendChild(message);
      } else {
        const avatar = document.createElement('div');
        avatar.innerHTML = createAvatar();
        msgContainer.appendChild(avatar);
        msgContainer.appendChild(message);
      }

      chatContent.appendChild(msgContainer);
      chatContent.scrollTop = chatContent.scrollHeight;
    }

    // Enviar mensaje
    document.getElementById('send-btn').addEventListener('click', () => {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      // Eliminar saludo inicial
      if (document.querySelector('.greeting')) {
        document.querySelector('.greeting').remove();
        document.querySelector('.typewriter-container').remove();
        document.querySelector('.date-info').remove();
      }

      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        addMessage(`Gracias por tu mensaje: "${text}". ¿En qué más puedo ayudarte?`, false);
      }, 1500);
    });

    // Enter = enviar
    document.getElementById('user-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') document.getElementById('send-btn').click();
    });
  </script>

</body>
