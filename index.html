<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chatbot IA Ligero</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #chat-box {
      height: 400px;
      border: 1px solid #ccc;
      padding: 10px;
      overflow-y: scroll;
      margin-bottom: 20px;
      background-color: #f9f9f9;
    }
    .user-message {
      text-align: right;
      color: blue;
    }
    .ai-message {
      text-align: left;
      color: green;
    }
    input[type="text"] {
      width: 80%;
      padding: 8px;
    }
    button {
      padding: 8px 15px;
    }
  </style>
</head>
<body>

  <h1>Chatbot IA Ligero (Gratuito)</h1>

  <div id="chat-box"></div>

  <form id="chat-form">
    <input type="text" id="user-input" placeholder="Pregúntame algo..." />
    <button type="submit">Enviar</button>
  </form>

  <!-- Incluir transformers.js -->
  <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0/dist/transformers.min.js"></script>

  <script>
    let generator = null;
    const chatBox = document.getElementById('chat-box');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');

    // Cargar modelo ligero
    async function loadModel() {
      if (!generator) {
        chatBox.innerHTML += '<div>Cargando modelo GPT-2...</div>';
        generator = await window.transformers.pipeline('text-generation', 'Xenova/gpt2');
        chatBox.innerHTML += Modelo listo. Puedes comenzar a preguntar.</div>';
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }

    // Simulación de búsqueda web (por ahora solo contexto general)
    function searchWeb(query) {
      return `Información sobre: ${query}.`;
    }

    // Generar respuesta
    async function generateResponse(question) {
      const prompt = `Pregunta: ${question}\nRespuesta: `;
      const output = await generator(prompt, {
        max_new_tokens: 50,
        temperature: 0.7,
      });
      return output[0].generated_text.replace(prompt, "");
    }

    // Enviar mensaje
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const userText = input.value.trim();
      if (!userText) return;

      // Mostrar mensaje usuario
      chatBox.innerHTML += `<div class="user-message"><strong>Tú:</strong> ${userText}</div>`;
      input.value = '';

      // Generar respuesta
      const aiText = await generateResponse(userText);

      // Mostrar respuesta IA
      chatBox.innerHTML += `<div class="ai-message"><strong>IA:</strong> ${aiText}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Cargar modelo al inicio
    loadModel();
  </script>

</body>
</html>
