<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OcladeIA - Asistente Profesional</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: #0f0c29; /* Fondo oscuro */
      background: linear-gradient(to right, #24243e, #302b63, #0f0c29); /* Degradado morado */
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .chat-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 800px;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
      margin: 20px auto;
    }
    .header {
      background: linear-gradient(90deg, #4b6cb7, #182848);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 1.8rem;
      letter-spacing: 1px;
    }
    .header p {
      font-size: 0.9rem;
      opacity: 0.8;
    }
    .chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      color: white;
    }
    .message {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 20px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user-message {
      align-self: flex-end;
      background: linear-gradient(90deg, #4b6cb7, #3a5ca0);
      color: white;
    }
    .ai-message {
      align-self: flex-start;
      background: rgba(50, 50, 70, 0.8);
      color: #e0e0ff;
    }
    .input-area {
      display: flex;
      padding: 15px;
      background: rgba(20, 20, 35, 0.9);
      border-top: 1px solid #444;
    }
    .input-area input {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid #555;
      border-radius: 30px;
      background: rgba(30, 30, 50, 0.8);
      color: white;
      outline: none;
    }
    .input-area input:focus {
      border-color: #4b6cb7;
    }
    .input-area button {
      margin-left: 10px;
      padding: 14px 25px;
      background: linear-gradient(90deg, #4b6cb7, #3a5ca0);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .input-area button:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #3a5ca0, #2a4a8a);
    }
  </style>
</head>
<body>

  <!-- Partículas de fondo -->
  <div id="particles-js"></div>

  <div class="chat-container">
    <div class="header">
      <h1>🤖 OcladeIA</h1>
      <p>Asistente Profesional con Inteligencia Artificial y Búsqueda Web</p>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="message ai-message">
        ¡Hola! Soy <strong>OcladeIA</strong>, tu asistente inteligente. ¿En qué puedo ayudarte hoy?
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="user-input" placeholder="Haz tu pregunta a OcladeIA..." />
      <button id="send-btn">Enviar</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Configuración de partículas
    particlesJS("particles-js", {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: { value: 0.5, },
        size: { value: 3, random: true },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#4b6cb7",
          opacity: 0.4,
          width: 1
        },
        move: {
          enable: true,
          speed: 2,
          direction: "none",
          random: true,
          straight: false,
          out_mode: "out",
          bounce: false
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" },
          resize: true
        }
      }
    });

    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Simular respuesta de IA con búsqueda web
    async function getAIResponse(query) {
      // Simulación de respuesta realista
      const responses = [
        `Sobre "${query}", he encontrado información reciente que indica que ...`,
        `La búsqueda sobre "${query}" revela que ...`,
        `Según mis fuentes actualizadas, ${query} es ...`,
        `Tras analizar tu pregunta, puedo decirte que ${query} ...`
      ];
      return responses[Math.floor(Math.random() * responses.length)];
    }

    // Enviar mensaje
    sendBtn.addEventListener('click', async () => {
      const userText = input.value.trim();
      if (!userText) return;

      // Mostrar mensaje del usuario
      addMessage(userText, 'user');

      // Limpiar entrada
      input.value = '';

      // Mostrar "escribiendo..."
      const typing = document.createElement('div');
      typing.className = 'message ai-message';
      typing.textContent = 'OcladeIA está escribiendo...';
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;

      // Obtener respuesta de IA
      const aiResponse = await getAIResponse(userText);

      // Quitar "escribiendo..." y mostrar respuesta
      typing.remove();
      addMessage(aiResponse, 'ai');
    });

    // Función para agregar mensaje al chat
    function addMessage(text, sender) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}-message`;
      messageDiv.textContent = text;
      chatBox.appendChild(messageDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Permitir enviar con Enter
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });
  </script>

</body>
</html>
